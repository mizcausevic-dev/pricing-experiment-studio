  <text x="92" y="224" fill="#FFF8EE" font-family="Georgia, serif" font-size="42" font-weight="700">without breaking trust, activation, or enterprise confidence.</text>
  <text x="92" y="272" fill="#B7C0D1" font-family="Arial, sans-serif" font-size="22">Package ladders, elasticity signals, experiment posture, and pricing action sequencing in one view.</text>

  <g>
