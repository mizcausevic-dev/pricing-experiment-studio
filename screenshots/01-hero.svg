<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="900" rx="32" fill="#0C0A12"/>
  <rect x="40" y="40" width="1320" height="820" rx="28" fill="#121020" stroke="#2C2A42"/>
  <text x="92" y="112" fill="#F7B0CF" font-family="Arial, sans-serif" font-size="20" letter-spacing="4">PRICING EXPERIMENT STUDIO</text>
