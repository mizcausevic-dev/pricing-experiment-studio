    <text x="124" y="446" fill="#FFF3C8" font-family="Georgia, serif" font-size="48" font-weight="700">$6.4M</text>
    <text x="124" y="486" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="26" font-weight="700">ARR under active test</text>
  </g>

  <g>
    <rect x="400" y="330" width="280" height="190" rx="22" fill="#18162A" stroke="#30304A"/>
