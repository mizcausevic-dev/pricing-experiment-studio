    <text x="740" y="486" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="26" font-weight="700">Signal quality</text>
  </g>

  <g>
    <rect x="1016" y="330" width="252" height="190" rx="22" fill="#18162A" stroke="#30304A"/>
    <text x="1048" y="374" fill="#B7C0D1" font-family="Arial, sans-serif" font-size="18">Rollback watch</text>
