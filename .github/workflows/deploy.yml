name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: FTP-sync built dashboard to pricing.kineticgain.com
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          test -f dist/index.html || (echo "FAIL: dist/index.html missing" && exit 1)
          grep -q "Pricing Experiment Studio" dist/index.html || \
            (echo "FAIL: dist/index.html missing brand string" && exit 1)
          echo "OK: build verified"
          ls -lah dist/

      - name: FTP-Deploy dist/ to /pricing/ (first attempt)
        id: deploy
        timeout-minutes: 5
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        continue-on-error: true
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftps
          port: 21
          timeout: 60000
          local-dir: ./dist/
          server-dir: /pricing/
          dangerous-clean-slate: false
          log-level: standard
          exclude: |
            **/.DS_Store

      - name: Sleep before retry (let FTP cap drain)
        if: steps.deploy.outcome == 'failure'
        run: sleep 60

      - name: Retry FTP-Deploy if first attempt failed
        if: steps.deploy.outcome == 'failure'
        timeout-minutes: 5
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftps
          port: 21
          timeout: 90000
          local-dir: ./dist/
          server-dir: /pricing/
          dangerous-clean-slate: false
          log-level: verbose
          exclude: |
            **/.DS_Store

      - name: Post-deploy verification
        run: |
          status=$(curl -sIo /dev/null -w "%{http_code}" "https://pricing.kineticgain.com/")
          if [ "$status" = "200" ]; then
            echo "OK: https://pricing.kineticgain.com/ -> 200"
          else
            echo "FAIL: https://pricing.kineticgain.com/ -> $status"
            exit 1
          fi
